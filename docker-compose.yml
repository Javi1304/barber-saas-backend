version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: barber_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: barber_saas
      TZ: America/Mexico_City  # Sincroniza la base de datos con la hora de CDMX
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  app:
    build: .
    container_name: barber_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: barber_saas
      TZ: America/Mexico_City  # Forza a Node.js a interpretar todo en la hora de CDMX
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  db_data: